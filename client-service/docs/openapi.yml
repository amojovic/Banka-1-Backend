openapi: 3.1.0
info:
  title: Client Service API
  description: API za upravljanje klijentima banke
  version: "1.0"
servers:
  - url: http://localhost:8083
    description: Generated server url
security:
  - bearerAuth: []
paths:
  /customers/{id}:
    put:
      tags:
        - client-controller
      summary: Izmena podataka klijenta
      operationId: updateClient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientUpdateRequestDto"
        required: true
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ClientResponseDto"
    delete:
      tags:
        - client-controller
      summary: Brisanje klijenta
      operationId: deleteClient
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "204":
          description: No Content
  /customers:
    get:
      tags:
        - client-controller
      summary: Pretraga klijenata
      operationId: searchClients
      parameters:
        - name: ime
          in: query
          required: false
          schema:
            type: string
        - name: prezime
          in: query
          required: false
          schema:
            type: string
        - name: email
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
            maximum: 100
            minimum: 1
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageClientResponseDto"
    post:
      tags:
        - client-controller
      summary: Kreiranje klijenta
      operationId: createClient
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClientCreateRequestDto"
        required: true
      responses:
        "201":
          description: Created
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ClientResponseDto"
  /customers/search:
    get:
      tags:
        - client-controller
      summary: Globalna pretraga klijenata
      operationId: globalSearchClients
      parameters:
        - name: query
          in: query
          required: false
          schema:
            type: string
        - name: page
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 0
        - name: size
          in: query
          required: false
          schema:
            type: integer
            format: int32
            default: 10
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/PageClientResponseDto"
  /customers/jmbg/{jmbg}:
    get:
      tags:
        - client-controller
      summary: Pronalazak ID klijenta po JMBG-u
      operationId: getClientIdByJmbg
      parameters:
        - name: jmbg
          in: path
          required: true
          schema:
            type: string
            minLength: 13
            maxLength: 13
            pattern: "^[0-9]{13}$"
      responses:
        "200":
          description: OK
          content:
            '*/*':
              schema:
                $ref: "#/components/schemas/ClientIdResponseDto"
components:
  schemas:
    ClientCreateRequestDto:
      type: object
      properties:
        ime:
          type: string
          minLength: 1
        prezime:
          type: string
          minLength: 1
        datumRodjenja:
          type: integer
          format: int64
        pol:
          type: string
          enum:
            - M
            - Z
        email:
          type: string
          format: email
          minLength: 1
        brojTelefona:
          type: string
          pattern: "^\\+?[0-9]{8,15}$"
        adresa:
          type: string
        jmbg:
          type: string
          minLength: 13
          maxLength: 13
          pattern: "^[0-9]{13}$"
      required:
        - datumRodjenja
        - email
        - ime
        - jmbg
        - pol
        - prezime
    ClientUpdateRequestDto:
      type: object
      properties:
        ime:
          type: string
          minLength: 1
        prezime:
          type: string
          minLength: 1
        datumRodjenja:
          type: integer
          format: int64
        pol:
          type: string
          enum:
            - M
            - Z
        email:
          type: string
          format: email
        brojTelefona:
          type: string
          pattern: "^\\+?[0-9]{8,15}$"
        adresa:
          type: string
    ClientResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
        ime:
          type: string
        prezime:
          type: string
        datumRodjenja:
          type: integer
          format: int64
        pol:
          type: string
          enum:
            - M
            - Z
        email:
          type: string
        brojTelefona:
          type: string
        adresa:
          type: string
    ClientIdResponseDto:
      type: object
      properties:
        id:
          type: integer
          format: int64
    PageClientResponseDto:
      type: object
      properties:
        totalPages:
          type: integer
          format: int32
        totalElements:
          type: integer
          format: int64
        size:
          type: integer
          format: int32
        content:
          type: array
          items:
            $ref: "#/components/schemas/ClientResponseDto"
        number:
          type: integer
          format: int32
        sort:
          $ref: "#/components/schemas/SortObject"
        first:
          type: boolean
        last:
          type: boolean
        numberOfElements:
          type: integer
          format: int32
        pageable:
          $ref: "#/components/schemas/PageableObject"
        empty:
          type: boolean
    PageableObject:
      type: object
      properties:
        offset:
          type: integer
          format: int64
        sort:
          $ref: "#/components/schemas/SortObject"
        pageNumber:
          type: integer
          format: int32
        pageSize:
          type: integer
          format: int32
        paged:
          type: boolean
        unpaged:
          type: boolean
    SortObject:
      type: object
      properties:
        empty:
          type: boolean
        sorted:
          type: boolean
        unsorted:
          type: boolean
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
