name: CI - Java Services

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches: [main, dev]
    paths:
      - 'company-observability-starter/**'
      - 'employee-service/**'
      - 'client-service/**'
      - 'account-service/**'
      - 'security-lib/**'
      - 'notification-service/**'
      - 'verification-service/**'
      - 'exchange-service/**'
      - 'stock-service/**'
  pull_request:
    branches: [main, dev]
    paths:
      - 'company-observability-starter/**'
      - 'employee-service/**'
      - 'client-service/**'
      - 'account-service/**'
      - 'notification-service/**'
      - 'security-lib/**'
      - 'verification-service/**'
      - 'exchange-service/**'
      - 'stock-service/**'

jobs:

  detect-changes:
    name: Detect changed services
    runs-on: ubuntu-latest
    outputs:
      services: ${{ steps.filter.outputs.changes }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Filter changed paths
        uses: dorny/paths-filter@v3.0.2
        id: filter
        with:
          filters: |
            company-observability-starter:
              - 'company-observability-starter/**'
            employee-service:
              - 'employee-service/**'
            client-service:
              - 'client-service/**'
            account-service:
              - 'account-service/**'
            notification-service:
              - 'notification-service/**'
            security-lib:
              - 'security-lib/**'
            verification-service:
              - 'verification-service/**'
            exchange-service:
              - 'exchange-service/**'
            stock-service:
              - 'stock-service/**'

  build-and-test:
    name: Build & Test (${{ matrix.service }})
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.services != '[]' && needs.detect-changes.outputs.services != '' }}
    runs-on: ubuntu-latest

    # ✅ PostgreSQL service (matches app config)
    services:
      postgres:
        image: postgres:15
        ports:
          - 5441:5432
        env:
          POSTGRES_DB: stock_db
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJson(needs.detect-changes.outputs.services) }}

    env:
      STOCK_DB_HOST: localhost
      STOCK_DB_PORT: 5441
      STOCK_DB_NAME: stock_db
      STOCK_DB_USER: postgres
      STOCK_DB_PASSWORD: postgres

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up JDK 21
        uses: actions/setup-java@v4.7.0
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.14'

      # ✅ Wait for DB to be ready
      - name: Wait for PostgreSQL
        run: |
          for i in {1..20}; do
            pg_isready -h localhost -p 5441 -U postgres && exit 0
            echo "Waiting for PostgreSQL..."
            sleep 2
          done
          echo "Postgres failed to start"
          exit 1

      - name: Publish shared libraries to mavenLocal
        run: |
          gradle :security-lib:publishToMavenLocal :company-observability-starter:publishToMavenLocal --no-daemon --warning-mode none --console plain

      - name: Lint
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:checkstyleMain" ":${SERVICE}:checkstyleTest" --no-daemon --warning-mode none --console plain

      - name: Build
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:build" -x test --no-daemon --warning-mode none --console plain

      - name: Test
        run: |
          SERVICE="${{ matrix.service }}"
          gradle ":${SERVICE}:test" --no-daemon --warning-mode none --console plain

      - name: Generate JaCoCo report (if available)
        if: always()
        run: |
          SERVICE="${{ matrix.service }}"
          if gradle ":${SERVICE}:tasks" --all --console plain | grep -q "jacocoTestReport"; then
            gradle ":${SERVICE}:jacocoTestReport" --no-daemon --warning-mode none --console plain
          else
            echo "No jacocoTestReport task for ${SERVICE}; skipping coverage report generation."
          fi

      - name: Publish test report
        uses: mikepenz/action-junit-report@v5
        if: always()
        with:
          report_paths: '${{ matrix.service }}/build/test-results/test/TEST-*.xml'
          check_name: 'Test Report - ${{ matrix.service }}'

      - name: Upload test artifacts on failure
        uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: test-results-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/build/reports/tests/
          retention-days: 7

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: coverage-${{ matrix.service }}-${{ github.run_id }}
          path: ${{ matrix.service }}/build/reports/jacoco/test/html/
          if-no-files-found: ignore
          retention-days: 7