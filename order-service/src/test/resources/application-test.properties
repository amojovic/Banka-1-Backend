# WP-10: test profile for order-service @DataJpaTest slice tests.
#
# order-service runs in library mode (no application.properties of its own), so the
# slice needs an explicit datasource. H2 in PostgreSQL-compatibility mode; Liquibase
# is disabled because the changesets use PostgreSQL-specific syntax — Hibernate
# create-drop builds the schema directly from the @Entity mappings instead.
spring.datasource.url=jdbc:h2:mem:order_testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.liquibase.enabled=false

# Slice tests do not need a broker.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration
