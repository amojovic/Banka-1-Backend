# Test konfiguracija za transfer-service.
#
# Glavni application properties fajl je .disabled (transfer-service se vrti kao
# library u konsolidovanom banking-core servisu), pa testovi nemaju nikakvu
# konfiguraciju. Bez ovog fajla Liquibase auto-config trazi default YAML master
# changelog koji ne postoji -> ChangeLogParseException.
#
# Resenje: iskljuci Liquibase u testovima i pusti Hibernate da generise H2 semu
# direktno iz @Entity klase (Transfer). Sema je 1:1 sa 001-transfer-schema.sql.
spring.datasource.url=jdbc:h2:mem:transfer-service-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false
spring.liquibase.enabled=false

# Dummy JWT secret da security-lib @ConfigurationProperties binding ne padne
# pri ucitavanju Spring konteksta (npr. @WebMvcTest filter chain).
jwt.secret=test-secret-key-for-transfer-service-tests-32-chars-min
banka.security.issuer=banka1
banka.security.id=id
banka.security.expiration-time=3600000
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/v3/api-docs/**,/swagger-ui/**
