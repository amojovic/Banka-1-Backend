# Test konfiguracija za transfer-service.
#
# Glavni application properties fajl je .disabled (transfer-service se vrti kao
# library u konsolidovanom banking-core servisu), pa @DataJpaTest testovi nemaju
# nikakvu konfiguraciju. Bez ovog fajla Liquibase auto-config trazi default
# YAML master changelog koji ne postoji -> ChangeLogParseException.
#
# Resenje: iskljuci Liquibase u testovima i pusti Hibernate da generise H2 semu
# direktno iz @Entity klase (Transfer). Sema je 1:1 sa 001-transfer-schema.sql.
spring.liquibase.enabled=false

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

# Dummy JWT secret da security-lib @ConfigurationProperties binding ne padne
# pri ucitavanju Spring konteksta (npr. @WebMvcTest filter chain).
jwt.secret=test-secret-key-for-transfer-service-tests-32-chars-min
