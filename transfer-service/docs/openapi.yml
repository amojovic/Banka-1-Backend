openapi: 3.1.0
info:
  title: Transfer Service API
  description: Servis za prenos sredstava između računa istog klijenta (interni i kros-valutni).
  version: 1.0.0
servers:
  - url: http://localhost/api/transfers
    description: API Gateway
security:
  - BearerAuthentication: []
paths:
  /:
    post:
      tags:
        - transfer-controller
      summary: Izvršavanje novog transfera
      description: Kreira novi transfer između dva računa istog vlasnika. Zahteva 2FA verifikaciju.
      operationId: executeTransfer
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TransferRequestDto"
        required: true
      responses:
        "200":
          description: Transfer uspešno izvršen
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TransferResponseDto"
        "400":
          description: Neispravni podaci ili nedovoljno sredstava
        "403":
          description: Računi ne pripadaju istom vlasniku
        "409":
          description: Transfer je već procesuiran (Idempotencija)

    get:
      tags:
        - transfer-controller
      summary: Istorija transfera klijenta
      description: Vraća paginiranu listu svih transfera za određenog klijenta.
      operationId: getClientTransfers
      parameters:
        - name: clientId
          in: query
          required: true
          schema:
            type: integer
            format: int64
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK

  /{orderNumber}:
    get:
      tags:
        - transfer-controller
      summary: Detalji transfera
      description: Vraća detaljne informacije o transferu na osnovu broja naloga.
      operationId: getTransferDetails
      parameters:
        - name: orderNumber
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: OK
        "404":
          description: Transfer nije pronađen

  /accounts/{accountNumber}:
    get:
      tags:
        - transfer-controller
      summary: Istorija transfera po računu
      description: Vraća paginiranu listu svih transfera gde je dati račun (accountNumber) bio pošiljalac ili primalac sredstava.
      operationId: getAccountTransfers
      parameters:
        - name: accountNumber
          in: path
          required: true
          description: Broj bankovnog računa
          schema:
            type: string
        - name: page
          in: query
          description: Broj stranice (kreće od 0)
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          description: Veličina stranice
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: "#/components/schemas/TransferResponseDto"
                  pageable:
                    type: object
                  totalElements:
                    type: integer
                  totalPages:
                    type: integer
        "403":
          description: Nemate prava da pristupite transferima ovog računa

components:
  securitySchemes:
    BearerAuthentication:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    TransferRequestDto:
      type: object
      properties:
        fromAccountNumber: { type: string }
        toAccountNumber: { type: string }
        amount: { type: number }
        verificationCode: { type: string }
        verificationSessionId: { type: string }
    TransferResponseDto:
      type: object
      properties:
        orderNumber: { type: string }
        fromAccountNumber: { type: string }
        toAccountNumber: { type: string }
        initialAmount: { type: number }
        finalAmount: { type: number }
        exchangeRate: { type: number }
        commission: { type: number }
        timestamp: { type: string, format: date-time }