services:
  postgres_transfer:
    image: postgres:15
    container_name: banka_transfer_db
    ports:
      - "${DB_PORT:-5432}:5432"
    env_file:
      - .env
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_transfer_data:/var/lib/postgresql/data
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    container_name: banka_rabbitmq_transfer
    healthcheck:
      test: [ "CMD", "rabbitmq-diagnostics", "-q", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USERNAME:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-guest}
    restart: unless-stopped

  transfer-service:
    build:
      context: ..
      dockerfile: transfer-service/Dockerfile
    container_name: banka_transfer_service
    expose:
      - "${SERVER_PORT:-8085}"
    env_file:
      - .env
    environment:
      SPRING_PROFILES_ACTIVE: local
      DB_HOST: postgres_transfer
      RABBITMQ_HOST: rabbitmq
      SERVER_PORT: 8085 # <--- DODATO OVO! Ovo forsira Spring da sluša na 8085
    depends_on:
      postgres_transfer:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  api-gateway:
    build:
      context: ..
      dockerfile: api-gateway/Dockerfile
    container_name: banka_transfer_gateway
    ports:
      - "80:80"
    environment:
      # Eksplicitno mapiramo sve varijable koje template koristi
      SERVER_PORT: 8081
      CLIENT_SERVICE_PORT: 8083
      ACCOUNT_SERVICE_PORT: 8084
      TRANSFER_SERVICE_PORT: 8085
    # OVO JE TRIK: NGINX će pokušati da pronađe 'employee-service' host.
    # Pošto on nije u ovom compose-u, rekli smo mu da "gađa" localhost
    # kako ne bi izbacio "host not found" grešku pri startu.
    extra_hosts:
      - "employee-service:127.0.0.1"
      - "client-service:127.0.0.1"
      - "account-service:127.0.0.1"
    depends_on:
      - transfer-service

volumes:
  postgres_transfer_data: