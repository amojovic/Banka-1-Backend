services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: transferdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d transferdb"]
      interval: 5s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 15

  transfer-service:
    image: ci-test/transfer-service:latest
    environment:
      SERVER_PORT: 8085
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: transferdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: transfer.events
      NOTIFICATION_ROUTING_KEY: transfer.#
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-hmac

      SPRING_PROFILES_ACTIVE: local
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy