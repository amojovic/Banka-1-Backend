server.port=0
company.observability.starter.enabled=false
spring.datasource.url=jdbc:h2:mem:userservice;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH;NON_KEYWORDS=VALUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.liquibase.enabled=false
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=rabbit
spring.rabbitmq.password=rabbit
rabbitmq.queue=test-notification-queue
rabbitmq.exchange=employee.events
rabbitmq.routing-key=employee.#
jwt.secret=OvoJeNekaDugackaTajnaSifraZaJwtKojuNeStavljamoUProperties
banka.security.issuer=banka1
banka.security.id=id
banka.security.expiration-time=3600000
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/employees/auth/**,/auth/*,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/actuator/health/liveness,/actuator/health/readiness,/actuator/info
url.reset-password=http://localhost:4200/auth/reset-password?token=
url.activate-account=http://localhost:4200/auth/activate-account?token=
token.refresh.expiration-time=1
token.confirmation.expiration-time=15
account.lockout.max-attempts=5
account.lockout.duration-minutes=15

# Role -> Permission mapa (AppProperties, prefiks "employees").
# Zrcali employees-permissions.yaml; potrebno jer @SpringBootTest ne ucitava taj yaml.
employees.permissions.BASIC[0]=BANKING_BASIC
employees.permissions.BASIC[1]=CLIENT_MANAGE
employees.permissions.AGENT[0]=SECURITIES_TRADE_LIMITED
employees.permissions.SUPERVISOR[0]=SECURITIES_TRADE_UNLIMITED
employees.permissions.SUPERVISOR[1]=TRADE_UNLIMITED
employees.permissions.SUPERVISOR[2]=OTC_TRADE
employees.permissions.SUPERVISOR[3]=FUND_AGENT_MANAGE
employees.permissions.SUPERVISOR[4]=MARGIN_TRADE
employees.permissions.ADMIN[0]=EMPLOYEE_MANAGE_ALL
