# WP-2: test profil za trading-service slice testove (audit infrastruktura).
#
# H2 in-memory u PostgreSQL kompat. modu — Liquibase iskljucen jer SQL changeset-i
# koriste PostgreSQL-specificne tipove (BIGSERIAL, JSONB). Hibernate ddl-auto
# create-drop gradi semu iz @Entity mapiranja za @DataJpaTest slice-ove.
spring.datasource.url=jdbc:h2:mem:trading_testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.liquibase.enabled=false

# Iskljuci RabbitMQ auto-config u testovima — slice testovi ne treba broker.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration

# Override placeholdera iz application.properties koji u testu nemaju env vars
# (inace TypeMismatch/NumberFormatException pri context-load-u slice testova).
jwt.secret=test-secret-key-for-trading-slice-tests-min-32-chars
spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=guest
spring.rabbitmq.password=guest
rabbitmq.queue=test.notification.queue
rabbitmq.exchange=employee.events
rabbitmq.routing-key=test.notification.key
