# WP-1: test profile for notification-service slice tests.
#
# H2 in-memory in PostgreSQL-compatibility mode. Flyway is disabled because the
# migrations use PostgreSQL-specific types (JSONB, BIGSERIAL); H2 builds the
# schema from the JPA entities via ddl-auto=create-drop instead.
spring.datasource.url=jdbc:h2:mem:notification_testdb;MODE=PostgreSQL;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

spring.flyway.enabled=false

# Dummy JWT secret so security-lib JwtDecoder bean can be constructed in tests.
jwt.secret=test-secret-key-for-notification-service-tests-32-chars-min

# Exclude RabbitMQ + mail auto-config — slice tests do not need a broker.
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.amqp.RabbitAutoConfiguration,\
  org.springframework.boot.mail.autoconfigure.MailSenderAutoConfiguration
