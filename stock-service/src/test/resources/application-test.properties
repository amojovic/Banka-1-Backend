spring.datasource.url=jdbc:h2:mem:stock-service-test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db-changelog-stock.xml
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
management.otlp.metrics.export.enabled=false
stock.exchange-service.base-url=http://localhost:8085
stock.exchange-seed.enabled=false
stock.exchange-seed.csv-location=classpath:seed/exchanges.csv
stock.ticker-seed.enabled=false
stock.option-seed.enabled=false
stock.futures-seed.enabled=false
stock.futures-seed.csv-location=classpath:seed/future_data.csv
stock.forex-seed.enabled=false
stock.listing-refresh.enabled=false
stock.listing-refresh.interval-ms=900000
stock.market-data.base-url=https://www.alphavantage.co
stock.market-data.api-key=test-api-key
stock.market-data.alpha-vantage-api-key=test-api-key
stock.market-data.daily-history-limit=30
stock.influx.enabled=false
stock.influx.url=http://localhost:8086
stock.influx.org=banka1
stock.influx.bucket=market_data
stock.influx.token=test-token
jwt.secret=test_secret_key_at_least_32_characters_long
banka.security.issuer=banka1
banka.security.id=id
banka.security.roles-claim=roles
banka.security.permissions-claim=permissions
banka.security.permit-all=/actuator/health/liveness,/actuator/health/readiness,/actuator/info,/v3/api-docs/**,/v3/api-docs.yaml,/swagger-ui/**,/swagger-ui.html,/info
