services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: accountdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d accountdb"]
      interval: 5s
      timeout: 3s
      retries: 15

  rabbitmq:
    image: rabbitmq:3
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_port_connectivity"]
      interval: 5s
      timeout: 3s
      retries: 15

  account-service:
    image: ci-test/account-service:latest
    environment:
      ACCOUNT_SERVER_PORT: 8084
      ACCOUNT_DB_HOST: postgres
      ACCOUNT_DB_PORT: 5432
      ACCOUNT_DB_NAME: accountdb
      ACCOUNT_DB_USER: postgres
      ACCOUNT_DB_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USERNAME: guest
      RABBITMQ_PASSWORD: guest
      NOTIFICATION_QUEUE: notification-service-queue
      NOTIFICATION_EXCHANGE: employee.events
      NOTIFICATION_ROUTING_KEY: employee.#
      JWT_SECRET: ci-test-secret-that-is-long-enough-for-hmac
      SERVICES_USER_URL: http://localhost
      CLIENT_SERVER_PORT: 8083
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
